services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kolfinder
      POSTGRES_PASSWORD: kolfinder
      POSTGRES_DB: kolfinder
    ports:
      - "5432:5432"
    volumes:
      - kolfinder_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - kolfinder_redis:/data

volumes:
  kolfinder_postgres:
  kolfinder_redis:
